site_name: 'Car Rental'
site_description: 'Internal documentation for the Car Rental example project'

theme:
  name: 'material'
  palette:
    - scheme: 'default'
      primary: 'indigo'
      accent: 'indigo'
  features:
    - 'navigation.sections'
    - 'navigation.top'
    - 'content.code.copy'

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: 'mermaid'
          class: 'mermaid'
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - 'Overview': 'index.md'
  - 'Architecture': 'architecture.md'
  - 'Testing strategy': 'testing.md'
  - 'Decisions':
      - '0001 — Lightweight Hexagonal Architecture': 'decisions/0001-use-lightweight-hexagonal-architecture.md'
      - '0002 — Per-Car-Type Locking': 'decisions/0002-use-per-car-type-locking-for-atomic-allocation.md'
      - '0003 — Black-Box Testing': 'decisions/0003-favor-black-box-tests-through-the-rest-entry-point.md'
